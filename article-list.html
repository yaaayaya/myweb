<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Posts - Yun's World 📚</title>
    <style>
        :root {
            --primary: #d68c9b;
            --secondary: #aebcd9;
            --accent: #ffb74d;
            --bg-start: #fff5f7;
            --bg-end: #e3edf5;
            --text-main: #2d3436;
            --text-light: #636e72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            line-height: 1.7;
            min-height: 100vh;
            padding-top: 80px;
        }

        /* Nav Bar */
        .nav-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 100;
            gap: 25px;
        }

        .nav-bar a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-bar a:hover {
            color: var(--primary);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 80px 20px 60px;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), #ff9f7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1.2rem;
            margin-top: 20px;
        }

        /* Post List */
        .post-list {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .article-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
        }

        .article-image {
            width: 100%;
            height: 240px;
            border-radius: 16px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--secondary), #c8dce1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.6);
            font-size: 1.5rem;
            overflow: hidden;
        }

        .article-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .article-content h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--text-main), #4a5568);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .article-meta {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .read-more {
            display: inline-block;
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--primary), #ff9f7b);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .read-more:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(214,140,155,0.4);
        }

        /* Decorative blobs */
        .blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; 
                 background: linear-gradient(45deg, var(--primary), #ff9f7b); animation: float 30s infinite; }
        .blob-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; 
                 background: linear-gradient(45deg, var(--accent), #ffd79f); animation: float 25s infinite reverse; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -40px) rotate(10deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            .article-card { padding: 25px; }
            .nav-bar { gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="nav-bar">
        <a href="index.html">🏠 首頁</a>
        <a href="article-list.html">📚 全部文章</a>
        <a href="mailto:yun@example.com">✉️ 聯繫</a>
    </nav>

    <div class="hero">
        <h1>All Posts 📚</h1>
        <p class="subtitle">這裡是你所有的思考、生活碎片和創作記錄</p>
    </div>

    <div class="post-list" id="post-container"></div>

    <footer>
        <p>Made with 🌿 by Yun's World | © 2026</p>
    </footer>

    <script>
        // Post data
        const posts = [
            { date: 'March 5, 2026', category: '寫作', title: '開始建立個人網站', image: 'https://images.unsplash.com/photo-1498050106023-c5fb5523a3a6?w=600&h=300' },
            { date: 'February 28, 2026', category: '生活', title: '台北的春天來了', image: 'https://images.unsplash.com/photo-1481970572565-8f4a93713d6b?w=600&h=300' },
            { date: 'February 15, 2026', category: '音樂', title: '推薦一張專輯', image: 'https://images.unsplash.com/photo-1514320296408-f6a517b4d6cc?w=600&h=300' },
            { date: 'January 20, 2026', category: '技術', title: '學習 Python 的旅程', image: 'https://images.unsplash.com/photo-1526374925820-d5a3b7d9c3f5?w=600&h=300' },
            { date: 'January 10, 2026', category: '設計', title: '為什麼我喜歡 ins 風？', image: 'https://images.unsplash.com/photo-1493804228689-d756f7f72951?w=600&h=300' }
        ];

        // Render posts
        const container = document.getElementById('post-container');
        
        posts.forEach((post, i) => {
            const card = document.createElement('div');
            card.className = 'article-card';
            card.style.animationDelay = `${i * 0.1}s`;
            card.innerHTML = `
                <div class="article-image">
                    ${post.image ? `<img src="${post.image}" alt="${post.title}">` : '<span>圖片</span>'}
                </div>
                <div class="article-content">
                    <h2>${post.title}</h2>
                    <p class="article-meta">${post.date} • ${post.category}</p>
                    <a href="#" class="read-more">閱讀更多 →</a>
                </div>
            `;
            container.appendChild(card);
        });

        // Add scroll animation observer
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = 1;
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.article-card').forEach(card => {
            card.style.opacity = 0;
            card.style.transform = 'translateY(30px)';
            card.style.transition = 'all 0.6s ease';
            observer.observe(card);
        });
    </script>
</body>
</html>
