<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yun Ya - 開發者的筆記站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
        h1 { color: white; font-size: 2.5rem; text-align: center; margin-bottom: 2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .hero { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 3rem; margin-bottom: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .hero h2 { color: #667eea; font-size: 1.8rem; margin-bottom: 1rem; }
        .hero p { color: #666; font-size: 1.1rem; line-height: 1.8; }
        .section-title { text-align: center; color: white; margin-bottom: 2rem; font-size: 1.5rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        .blog-section { background: rgba(255,255,255,0.95); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .blog-section h3 { color: #333; font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 2px solid #667eea; display: inline-block; padding-bottom: 0.5rem; }
        .blog-btn { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.8rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 1rem; transition: transform 0.3s, box-shadow 0.3s; }
        .blog-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        footer { text-align: center; color: rgba(255,255,255,0.8); padding-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Hello, I'm Yun Ya!</h1>
        
        <div class="hero">
            <h2>歡迎來到我的開發者筆記站</h2>
            <p>這裡是我分享日常、學習與專案的角落。</p>
            <p>我會紀錄：</p>
            <ul style="color: #666; margin-top: 0.5rem;">
                <li>🤖 AI 助手 OpenClaw 的使用心得</li>
                <li>💻 前端開發的踩坑經驗</li>
                <li>⚙️ 自動化腳本與系統優化</li>
                <li>📚 持續學習的過程</li>
            </ul>
        </div>

        <div class="section-title">📝 我的部落格</div>
        
        <div class="blog-section">
            <h3>開始閱讀</h3>
            <p>想看我寫的文章？可以點擊下面的按鈕進入我的正式部落格！</p>
            <a href="/blog/index.html" class="blog-btn">🚀 進入部落格</a>
        </div>

        <footer>
            <p>&copy; 2026 Yun Ya. Powered by Jekyll & GitHub Pages.</p>
            <p style="margin-top: 0.5rem;">Made with ❤️ using OpenClaw 🦞</p>
        </footer>
    </div>
</body>
</html>
