<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Yun's World 📖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        :root {
            --primary: #d68c9b;
            --secondary: #aebcd9;
            --accent: #ffb74d;
            --bg-start: #fff5f7;
            --bg-end: #e3edf5;
            --text-main: #2d3436;
            --text-light: #636e72;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            line-height: 1.7;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background with floating particles */
        .background {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
        }

        .gradient-anim {
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, var(--primary), var(--accent), var(--secondary));
            animation: gradientFlow 15s ease infinite;
            opacity: 0.1;
        }

        @keyframes gradientFlow {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(30deg); }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: floatParticle 20s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-100px) scale(1.2); opacity: 1; }
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 80px 40px 60px;
        }

        /* Modern Nav Bar */
        .nav-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            padding: 10px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            z-index: 100;
            gap: 25px;
        }

        .nav-bar a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-bar a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 24px; height: 3px;
            background: var(--primary);
            transition: transform 0.3s ease;
            border-radius: 2px;
        }

        .nav-bar a:hover::after {
            transform: translateX(-50%) scaleX(1);
        }

        /* Header */
        header { text-align: center; padding: 80px 0 60px; }

        h1 {
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, var(--primary), #ff9f7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideDown 0.8s ease forwards, gradientShift 8s ease infinite;
        }

        .subtitle {
            color: var(--text-light);
            font-size: clamp(1.1rem, 2.5vw, 1.3rem);
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 1s ease forwards 0.4s;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Blog Nav */
        .blog-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .blog-nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .blog-nav a:hover {
            color: var(--primary);
            transform: translateY(-3px);
        }

        /* Blog Card Styles - More Interactive & Ins Style */
        .post-card-wrapper {
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .post-card-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .post-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .post-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(214,140,155,0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.6s ease;
        }

        .post-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 25px 70px rgba(0,0,0,0.12);
        }

        .post-card:hover::before {
            right: 10%;
        }

        /* Decorative gradient blob */
        .blob-decor {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            filter: blur(40px);
            opacity: 0.5;
            top: -30px;
            right: -30px;
            transition: all 0.6s ease;
        }

        .post-card:hover .blob-decor {
            transform: scale(1.1);
            opacity: 0.7;
        }

        /* Featured Image Preview */
        .post-visual {
            width: 100%;
            height: 240px;
            border-radius: 20px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, var(--secondary), #c8dce1);
        }

        .post-visual img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .post-card:hover .post-visual img {
            transform: scale(1.1);
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tag-writing { background: linear-gradient(135deg, #ffd9b3, #ffb74d); color: #2d3436; }
        .tag-life { background: linear-gradient(135deg, #b3e0ff, #80cbc4); color: #2d3436; }
        .tag-music { background: linear-gradient(135deg, #ffd9b3, #ff9f7b); color: #2d3436; }
        .tag-tech { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); color: #2d3436; }

        /* Post Content */
        h2.post-title {
            font-size: clamp(1.8rem, 4vw, 2.3rem);
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--text-main), #4a5568);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .post-meta {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .post-excerpt {
            font-size: 1.1rem;
            color: #4a5568;
            margin-bottom: 25px;
            line-height: 1.8;
        }

        /* Read More Button - More Interactive */
        .read-more {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--primary), #ff9f7b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .read-more::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .read-more:hover::before {
            left: 100%;
        }

        .read-more:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 30px rgba(214,140,155,0.4);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            position: relative;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 12px 30px;
            background: rgba(255,255,255,0.6);
            border-radius: 50px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-home:hover {
            background: var(--primary);
            color: white;
            transform: translateX(5px);
        }

        /* Social Links in Footer */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-top: 40px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .social-btn:hover {
            transform: scale(1.1) rotate(5deg);
            background: var(--primary);
            color: white;
        }

        @keyframes gradientShift {
            0%, 100% { filter: hue-rotate(0deg); }
            50% { filter: hue-rotate(25deg); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 2.2rem; }
            .post-card { padding: 30px 25px; }
            .post-visual { height: 180px; }
            .nav-bar { top: 10px; padding: 8px 20px; gap: 20px; }
        }

        /* Scroll Progress Bar */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            z-index: 1000;
            transition: width 0.1s;
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="gradient-anim"></div>
        <!-- Floating particles generated by JS -->
    </div>

    <nav class="nav-bar">
        <a href="index.html">首頁</a>
        <a href="blog.html">📖 部落格</a>
        <a href="#about">關於我</a>
        <a href="#contact">聯繫</a>
    </nav>

    <div class="scroll-progress" id="scrollProgress"></div>

    <header>
        <h1>Yun's Blog 📖</h1>
        <p class="subtitle">生活碎片 · 閱讀筆記 · 思考記錄</p>
        
        <nav class="blog-nav">
            <a href="index.html">🏠 首頁</a>
            <a href="article-list.html">✍️ 全部文章</a>
            <span style="color:var(--text-light);opacity:0.6;cursor:not-allowed">☕ 生活 / 🎵 音樂 / 💻 技術（暫整合於全部文章中）</span>
        </nav>
    </header>

    <div class="container" id="blog-content">
        <!-- Post cards will be loaded here -->
    </div>

    <footer>
        <p>Made with 🌿 & code by Yun's World | © 2026</p>
        
        <a href="index.html" class="back-home">← 回到首頁</a>

        <div class="social-links">
            <a href="https://t.me/yaayayaa_bot" target="_blank" class="social-btn" title="Telegram">📱</a>
            <a href="#" class="social-btn" title="Instagram">📷</a>
            <a href="mailto:yun@example.com" class="social-btn" title="Email">✉️</a>
            <a href="#" class="social-btn" title="GitHub">💻</a>
        </div>
    </footer>

    <script>
        // Blog Posts Data
        const posts = [
            {
                date: 'March 5, 2026',
                category: '寫作',
                tags: ['💭'],
                title: '開始建立個人網站',
                excerpt: '第一次嘗試自己做網站，感覺很有趣。決定使用純 HTML+CSS，不依賴任何外部框架。從零到一打造屬於自己的數位空間。',
                image: 'https://images.unsplash.com/photo-1498050106023-c5fb5523a3a6?w=600&h=300&fit=crop&auto=format'
            },
            {
                date: 'February 28, 2026',
                category: '生活',
                tags: ['☕'],
                title: '台北的春天來了',
                excerpt: '剛入春，空氣裡的咖啡香和綠意讓人心情特別好。今天試著做了手沖，窗外的櫻花剛好盛開。',
                image: 'https://images.unsplash.com/photo-1481970572565-8f4a93713d6b?w=600&h=300&fit=crop&auto=format'
            },
            {
                date: 'February 15, 2026',
                category: '音樂',
                tags: ['🎵'],
                title: '推薦一張專輯',
                excerpt: '最近發現的這張 Jazz 專輯，溫暖又放鬆，適合午後獨處時聽。爵士的旋律像是舊日的回憶...',
                image: 'https://images.unsplash.com/photo-1514320296408-f6a517b4d6cc?w=600&h=300&fit=crop&auto=format'
            },
            {
                date: 'January 20, 2026',
                category: '技術',
                tags: ['💻'],
                title: '學習 Python 的旅程',
                excerpt: '從零開始學習，雖然慢但很滿足。今天終於搞懂了 generators，感覺像是解開了一個長久懸而未決的謎題。',
                image: 'https://images.unsplash.com/photo-1526374925820-d5a3b7d9c3f5?w=600&h=300&fit=crop&auto=format'
            },
            {
                date: 'January 10, 2026',
                category: '設計',
                tags: ['🎨'],
                title: '為什麼我喜歡 ins 風？',
                excerpt: 'ins 風格不是簡單的配色，而是一種生活態度。乾淨、簡約但有溫度，像是朋友家裡那種舒服的感覺...',
                image: 'https://images.unsplash.com/photo-1493804228689-d756f7f72951?w=600&h=300&fit=crop&auto=format'
            }
        ];

        // Render Posts
        const blogContainer = document.getElementById('blog-content');
        
        posts.forEach((post, index) => {
            const cardHTML = `
                <div class="post-card-wrapper" style="animation-delay: ${index * 0.15}s">
                    <div class="post-card">
                        <div class="blob-decor"></div>
                        <div class="post-visual">
                            <img src="${post.image}" alt="${post.title} preview">
                        </div>
                        <span class="tag tag-writing">${post.category}</span>
                        <h2 class="post-title">${post.title}</h2>
                        <div class="post-meta">
                            <time datetime="${post.date}">${post.date}</time>
                            ${post.tags.map(t => `<span style="font-size:0.8rem;color:#636e72;">${t}</span>`).join('')}
                        </div>
                        <p class="post-excerpt">${post.excerpt}</p>
                        <a href="#" class="read-more">閱讀更多 →</a>
                    </div>
                </div>
            `;
            blogContainer.innerHTML += cardHTML;
        });

        // Generate Floating Particles
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (15 + Math.random() * 10) + 's';
            document.querySelector('.background').appendChild(particle);
        }

        // Scroll Progress Bar
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrolled = (scrollTop / scrollHeight) * 100;
            document.getElementById('scrollProgress').style.width = scrolled + '%';
        });

        // Scroll Animation Observer
        const observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.post-card-wrapper').forEach(el => {
            observer.observe(el);
        });

        // Smooth scroll for navigation
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
